<!DOCTYPE html>
<html>
<body>

<h2>Admin - KYC Requests</h2>

<div id="list"></div>

<script>

fetch("http://localhost:5000/kyc-list")
.then(res=>res.json())
.then(data=>{
    let div=document.getElementById("list");

    data.forEach(user=>{
        div.innerHTML+=`
        <p>${user.aadhaar} - ${user.pan}
        <button onclick="approve()">Approve</button></p>
        `;
    });
});

function approve(){
    fetch("http://localhost:5000/approve-kyc",{
        method:"POST"
    })
    .then(res=>res.json())
    .then(data=>alert(data.message));
}

</script>

</body>
</html>
