<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{
    font-family:Arial;
    background:#0b0f2f;
    color:white;
    padding:30px;
}
input{
    display:block;
    margin:10px 0;
    padding:10px;
    width:300px;
}
button{
    padding:10px;
    background:orange;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Admin - Add Course</h2>

<input id="title" placeholder="Course Title">
<input id="video" placeholder="Video URL">

<button onclick="addCourse()">Add Course</button>

<p id="msg"></p>

<script>

function addCourse(){

    let title = document.getElementById("title").value;
    let video = document.getElementById("video").value;

    if(!title || !video){
        alert("Please fill all fields");
        return;
    }

    fetch("https://captcha-backend-uiar.onrender.com/courses",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            title:title,
            video:video
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("msg").innerText = "Course Added Successfully ✅";
        console.log(data);
    })
    .catch(err => {
        console.log(err);
        alert("Error adding course ❌");
    });
}

</script>

</body>
</html>
