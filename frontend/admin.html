<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>

<body>

<h2>Add Course</h2>

<input id="title" placeholder="Title"><br><br>
<input id="video" placeholder="Video URL"><br><br>

<button onclick="add()">Add</button>

<script>
function add(){
    fetch("https://captcha-backend-uiar.onrender.com/courses",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            title:document.getElementById("title").value,
            video:document.getElementById("video").value
        })
    })
    .then(res=>res.json())
    .then(data=>{
        alert("Added");
    })
    .catch(()=>{
        alert("Error");
    });
}
</script>

</body>
</html>
