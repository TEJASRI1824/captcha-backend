<!DOCTYPE html>
<html>
<head>
<title>SkillRich Dashboard</title>

<style>
body{
    margin:0;
    display:flex;
    font-family:Arial;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#020a2b;
    color:white;
    height:100vh;
    padding:20px;
}

.sidebar h2{
    margin-bottom:30px;
}

.sidebar li{
    padding:12px;
    cursor:pointer;
}

.sidebar li:hover{
    background:#111a4a;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
    background:#f5f6fa;
}

.top{
    display:flex;
    justify-content:space-between;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

/* INPUT */
input{
    padding:10px;
    width:250px;
    margin:10px 0;
}

button{
    padding:10px 20px;
    background:orange;
    border:none;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="sidebar">
    <h2>SkillRich</h2>

    <ul>
        <li onclick="showSection('dashboard')">Dashboard</li>
        <li onclick="showSection('profile')">Profile</li>
        <li onclick="showSection('bank')">Bank</li>
        <li onclick="showSection('kyc')">KYC</li>
    </ul>
</div>

<div class="main">

<div class="top">
    <h2 id="title">Dashboard</h2>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
    <div class="cards" id="courses"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section" style="display:none;">
    <h3>My Profile</h3>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">

    <button onclick="saveProfile()">Save</button>
</div>

<!-- BANK -->
<div id="bank" class="section" style="display:none;">
    <h3>Bank Details</h3>

    <input id="acc" placeholder="Account Number">
    <input id="ifsc" placeholder="IFSC Code">

    <button onclick="saveBank()">Save</button>
</div>

<!-- KYC -->
<div id="kyc" class="section" style="display:none;">
    <h3>KYC Details</h3>

    <input id="aadhaar" placeholder="Aadhaar">
    <input id="pan" placeholder="PAN">

    <button onclick="saveKYC()">Save</button>
</div>

</div>

<script>

// ===== SWITCH SECTIONS =====
function showSection(id){
    let sections = document.getElementsByClassName("section");

    for(let i=0;i<sections.length;i++){
        sections[i].style.display="none";
    }

    document.getElementById(id).style.display="block";
    document.getElementById("title").innerText=id.toUpperCase();

    if(id==="profile") loadProfile();
}


// ===== LOAD COURSES =====
fetch("http://localhost:5000/courses")
.then(res=>res.json())
.then(data=>{
    let c=document.getElementById("courses");

    data.forEach(course=>{
        c.innerHTML+=`
        <div class="card">
            <h3>${course.title}</h3>
            <video width="100%" controls>
                <source src="${course.video}">
            </video>
        </div>`;
    });
});


// ===== SAVE PROFILE (BACKEND) =====
function saveProfile(){
    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;

    fetch("http://localhost:5000/save-profile",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,email})
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);

        localStorage.setItem("name",name);
        localStorage.setItem("email",email);
    });
}


// ===== AUTO LOAD PROFILE =====
function loadProfile(){
    document.getElementById("name").value=localStorage.getItem("name")||"";
    document.getElementById("email").value=localStorage.getItem("email")||"";
}


// ===== BANK =====
function saveBank(){
    alert("Bank Saved");
}


// ===== KYC =====
function saveKYC(){
    fetch("http://localhost:5000/kyc",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            aadhaar:document.getElementById("aadhaar").value,
            pan:document.getElementById("pan").value
        })
    })
    .then(res=>res.json())
    .then(data=>alert(data.message));
}

</script>

</body>
</html>
