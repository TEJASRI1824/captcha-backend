
<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{
    font-family:Arial;
    background:#0b0f2f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:#111a4a;
    padding:30px;
    border-radius:10px;
}
input{
    display:block;
    margin:10px 0;
    padding:10px;
    width:250px;
}
button{
    padding:10px;
    background:orange;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Register</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="registerUser()">Register</button>

<p>Already have account? <a href="login.html" style="color:orange;">Login</a></p>
</div>

<script>

function registerUser(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(!email || !password){
        alert("Fill all fields");
        return;
    }

    fetch("https://captcha-backend-uiar.onrender.com/register",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            email:email,
            password:password
        })
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        console.log(data);
    })
    .catch(err=>{
        console.log(err);
        alert("Error connecting to server");
    });
}

</script>

</body>
</html>
