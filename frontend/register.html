<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{
    font-family:Arial;
    background:#0b0f2f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:#111a4a;
    padding:30px;
    border-radius:10px;
}
input{
    display:block;
    margin:10px 0;
    padding:10px;
    width:250px;
}
button{
    padding:10px;
    background:orange;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Register</h2>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="register()">Register</button>

<p>Already have account? <a href="login.html" style="color:orange;">Login</a></p>
</div>

<script>
function register(){
    fetch("https://captcha-backend-uiar.onrender.com/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email:document.getElementById("email").value,
            password:document.getElementById("password").value
        })
    })
    .then(res=>res.json())
    .then(data=>alert(data.message));
}
</script>

</body>
</html>
